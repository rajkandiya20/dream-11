name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/*/* $ANDROID_HOME/cmdline-tools/latest/ || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_HOME} "build-tools;33.0.2" "platform-33"

      - name: Build React App
        run: npm run build

      - name: Setup Capacitor Android
        run: |
          npm install -g @capacitor/cli@5
          npx cap init com.dreameleven.app "Dream 11" || true
          npx cap add android

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v -keystore android/debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass androiddebug -keypass androiddebug -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dream11-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: dream11-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30