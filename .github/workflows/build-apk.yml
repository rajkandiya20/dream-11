name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build React App
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install -g @capacitor/cli
          npx cap init com.dreameleven.app "Dream 11"
          npx cap add android

      - name: Copy Web Assets to Android
        run: npx cap copy android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Sign APK (Optional - for testing)
        run: |
          echo "APK signing skipped - debug APK is unsigned for testing"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dream11-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: dream11-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30