name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build React App
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: dream11local.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID: dream11local
          REACT_APP_FIREBASE_STORAGE_BUCKET: dream11local.firebasestorage.app
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: "325007849691"
          REACT_APP_FIREBASE_APP_ID: "1:325007849691:web:2bc6df74747cf46e5234fe"
          CI: false
        run: npm run build

      - name: Setup Capacitor Android
        run: |
          npm install -g @capacitor/cli@5
          npx cap add android

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v -keystore android/debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass androiddebug -keypass androiddebug -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dream11-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: dream11-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
